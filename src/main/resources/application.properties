# Nome da aplicação Spring Boot
#
# Esta propriedade define o nome do microsserviço que será registrado no Eureka
# e utilizado para identificação em logs, métricas e monitoramento.
spring.application.name=ms-pedidos

# =============================================
# CONFIGURAÇÕES DO BANCO DE DADOS (PostgreSQL)
# =============================================

# URL de conexão com o banco de dados PostgreSQL
#
# Formato: jdbc:postgresql://[host]:[porta]/[nome_do_banco]
# - host: localhost (ambiente de desenvolvimento)
# - porta: 5432 (porta padrão do PostgreSQL)
# - banco: ms-pedidos-db (nome do banco de dados para o microsserviço de pedidos)
spring.datasource.url=jdbc:postgresql://localhost:5432/ms-pedidos-db

# Nome de usuário para autenticação no banco de dados
#
# Utiliza variável de ambiente ${USER} para maior segurança, permitindo
# que o valor seja configurado externamente sem expor credenciais no código.
spring.datasource.username=${USER}

# Senha para autenticação no banco de dados
#
# Utiliza variável de ambiente ${PASSWORD} para maior segurança, permitindo
# que o valor seja configurado externamente sem expor credenciais no código.
spring.datasource.password=${PASSWORD}

# Estratégia de geração do esquema do banco de dados (DDL)
#
# Valores possíveis:
# - none: Não faz nada (recomendado para produção)
# - validate: Valida se o esquema está correto, sem alterações
# - update: Atualiza o esquema existente mantendo os dados
# - create: Cria o esquema, destruindo dados existentes
# - create-drop: Cria o esquema e o destrói ao encerrar a aplicação
#
# ATENÇÃO: "create" é adequado para desenvolvimento, mas em produção
# deve-se usar "none" ou "validate" para evitar perda de dados.
spring.jpa.hibernate.ddl-auto=create

# =============================================
# CONFIGURAÇÕES DE LOG DO JPA/HIBERNATE
# =============================================

# Exibe as consultas SQL geradas pelo Hibernate no console
#
# Útil para depuração durante o desenvolvimento, permitindo visualizar
# as queries SQL executadas, identificar problemas de performance e
# otimizar consultas. Em produção, recomenda-se desabilitar (false).
spring.jpa.show-sql=true

# =============================================
# CONFIGURAÇÕES DO EUREKA (Service Discovery)
# =============================================

# Registra a instância no Eureka Server
#
# Quando true, a aplicação se registra automaticamente no servidor Eureka,
# permitindo que outros microsserviços a descubram através do service discovery.
# Em ambientes de desenvolvimento local, pode ser útil desabilitar para testes.
eureka.client.register-with-eureka=true

# Busca o registro de outros serviços no Eureka
#
# Quando true, a aplicação obtém a lista de outros microsserviços
# registrados no Eureka, permitindo comunicação entre eles através
# do load balancing e service discovery.
eureka.client.fetch-registry=true

# URL do servidor Eureka para registro e descoberta
#
# Define o endpoint do Eureka Server onde este microsserviço irá se registrar
# e onde buscará informações sobre outros serviços.
# Porta 8081: porta padrão do Eureka Server configurada no projeto.
eureka.client.service-url.defaultZone=http://localhost:8081/eureka

# =============================================
# CONFIGURAÇÕES DO SERVIDOR EMBUTIDO (Tomcat)
# =============================================

# Porta do servidor HTTP
#
# Quando definida como 0, o Spring Boot escolhe uma porta aleatória disponível
# automaticamente. Isso é útil em ambientes com múltiplas instâncias do mesmo
# serviço para evitar conflitos de porta.
server.port=0

# =============================================
# CONFIGURAÇÕES DE INSTÂNCIA NO EUREKA
# =============================================

# ID único da instância registrada no Eureka
#
# Define um identificador único para esta instância do microsserviço no Eureka.
# O formato {spring.application.name}:{random.int[1,100]} garante que cada instância
# tenha um ID único, mesmo quando múltiplas instâncias são iniciadas.
#
# Exemplo de IDs gerados:
# - ms-pedidos:42
# - ms-pedidos:17
# - ms-pedidos:89
eureka.instance.instance-id=${spring.application.name}:${random.int[1,100]}
